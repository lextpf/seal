site_name: seal Documentation
use_directory_urls: false
validation:
  links:
    not_found: info
site_description: AES-256-GCM encryption utility with Qt6 GUI and CLI modes

# main.html is the hand-authored theme override that lives alongside the
# doxide-generated markdown in docs/. Exclude it from the page collection so it
# is not copied verbatim into the built site; it is still picked up as the
# theme's custom_dir template below.
exclude_docs: |
  main.html

theme:
  name: material
  custom_dir: docs
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home:
    - index.md
  - API Reference:
    - Crypto:
      - Crypto/index.md
      - Crypto/Cryptography.md
      - cfg: cfg/index.md
      - EvpCipherCtx: Crypto/EvpCipherCtx.md
      - EvpMdCtx: Crypto/EvpMdCtx.md
    - Memory:
      - Memory/index.md
      - Memory/locked_allocator.md
      - Memory/locked_header.md
      - basic_secure_string: Memory/basic_secure_string.md
      - secure_triplet16: Memory/secure_triplet16.md
      - DPAPIGuard: Memory/DPAPIGuard.md
      - ScopedDpapiUnprotect: Memory/ScopedDpapiUnprotect.md
      - RWGuard: Memory/RWGuard.md
    - I/O:
      - IO/index.md
      - FileOperations:
        - IO/IO_FileOperations/index.md
        - IO/IO_FileOperations/FileOperations.md
      - Clipboard:
        - IO/IO_Clipboard/index.md
        - IO/IO_Clipboard/Clipboard.md
    - Vault:
      - Vault/index.md
      - Vault/VaultRecord.md
      - DecryptedCredential: Vault/DecryptedCredential.md
      - VaultModel:
        - Vault/VaultModel/index.md
        - Vault/VaultModel/VaultListModel.md
        - Vault/VaultModel/VaultListModel/Roles.md
    - GUI:
      - GUI/index.md
      - Backend:
        - GUI/Backend/index.md
        - GUI/Backend/Backend.md
      - FillController:
        - GUI/FillController/index.md
        - GUI/FillController/FillController.md
        - State: GUI/FillController/FillController/State.md
        - TypeTarget: GUI/FillController/FillController/TypeTarget.md
      - WindowController:
        - GUI/WindowController/index.md
        - GUI/WindowController/WindowController.md
      - WindowChrome:
        - GUI/WindowChrome/index.md
        - TitleBarFilter: GUI/WindowChrome/TitleBarFilter.md
      - NativeDialogs:
        - GUI/NativeDialogs/index.md
      - QrCapture:
        - GUI/QrCapture/index.md
    - CLI:
      - CLI/index.md
      - scoped_console: CLI/scoped_console.md
      - MaskedCredentialView:
        - CLI/MaskedCredentialView/index.md
        - CLI/MaskedCredentialView/MaskedCredentialView.md
        - HitRegion: CLI/MaskedCredentialView/MaskedCredentialView/HitRegion.md
      - CliHandler:
        - CLI/CliHandler/index.md
        - CliCallbacks: CLI/CliHandler/CliCallbacks.md
    - Utilities:
      - Utilities/index.md
      - Logging:
        - Utilities/Logging/index.md
    - Namespaces:
      - seal: seal/index.md
      - seal::secure_string: seal/secure_string/index.md
